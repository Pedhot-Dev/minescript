name: Build Minescript (Fabric)

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout Minescript
        uses: actions/checkout@v4

      # 2. Setup Java 21
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      # 3. Force Gradle 8 (Forge belum support Gradle 9)
      - name: Setup Gradle 8
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.7

      # 4. Cache Gradle
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}

      # 5. Clone Pyjinn (dependency penting)
      - name: Clone Pyjinn
        run: git clone https://github.com/maxuser0/pyjinn.git

      # 6. Build & publish Pyjinn ke mavenLocal
      - name: Build & Publish Pyjinn
        working-directory: pyjinn
        run: |
          chmod +x gradlew
          ./gradlew interpreter:publishToMavenLocal

      # 7. Permission gradlew Minescript
      - name: Grant execute permission
        run: chmod +x gradlew

      # 8. Build Fabric ONLY (hindari Forge)
      - name: Build Fabric Mod
        run: ./gradlew :fabric:build

      # 9. Upload hasil jar
      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: minescript-fabric
          path: fabric/build/libs/*.jar
